<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Predicting marketing campaign response">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252a36"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17A589"/>
      <stop offset="1" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ec8a5"/>
      <stop offset="1" stop-color="#148f9e"/>
    </linearGradient>
    <radialGradient id="glowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#17A589" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#17A589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E86C1" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2E86C1" stop-opacity="0"/>
    </radialGradient>

    <!-- reusable flying letter -->
    <g id="mail">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="#eef2f7"/>
      <path d="M -18 -12 L 0 3 L 18 -12" fill="none" stroke="#9aa4b0" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#3E4250" stroke-width="1" opacity="0.28">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>

  <!-- atmosphere -->
  <ellipse cx="250" cy="430" rx="320" ry="230" fill="url(#glowT)"/>
  <ellipse cx="600" cy="260" rx="300" ry="230" fill="url(#glowB)"/>

  <!-- isometric platform -->
  <polygon points="400,576 140,466 140,440 400,550 660,440 660,466" fill="#0e1219"/>
  <polygon points="400,330 660,440 400,550 140,440" fill="#1c2230"/>
  <polygon points="400,330 660,440 400,550 140,440" fill="none" stroke="url(#gb)" stroke-width="2" opacity="0.55"/>

  <!-- the campaign mailer: open 2.5D envelope on the platform -->
  <g transform="translate(268,462)">
    <!-- open back flap -->
    <polygon points="-78,-40 0,-102 78,-40" fill="#181d29" stroke="url(#gb)" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- letter rising out -->
    <rect x="-46" y="-88" width="92" height="46" rx="5" fill="#eef2f7"/>
    <line x1="-30" y1="-72" x2="30" y2="-72" stroke="#9aa4b0" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="-58" x2="10" y2="-58" stroke="#c3cad2" stroke-width="5" stroke-linecap="round"/>
    <!-- envelope body with side extrusion -->
    <polygon points="78,-40 94,-49 94,31 78,40" fill="#0f7d90"/>
    <rect x="-78" y="-40" width="156" height="80" rx="8" fill="url(#env)"/>
    <polygon points="-78,-40 0,22 78,-40" fill="#0b2f33" opacity="0.30"/>
    <polygon points="-78,-40 0,22 78,-40" fill="none" stroke="#0f1216" stroke-width="3" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- letters flying toward the target along the decision path -->
  <path d="M 300 340 C 380 220 500 180 596 190" fill="none" stroke="#2E86C1" stroke-width="2" stroke-dasharray="5 7" opacity="0.65"/>
  <use href="#mail" transform="translate(352,282) rotate(-14) scale(0.9)"/>
  <use href="#mail" transform="translate(452,214) rotate(-6)"/>
  <use href="#mail" transform="translate(548,194) rotate(3) scale(1.08)"/>

  <!-- the target: responders land the bullseye -->
  <g transform="translate(636,300)">
    <!-- stand legs -->
    <polygon points="-26,118 -14,118 6,58 -6,58" fill="#10141d"/>
    <polygon points="26,118 14,118 -6,58 6,58" fill="#151a26"/>
    <!-- board -->
    <circle r="74" fill="#101318" stroke="#ffffff" stroke-width="6"/>
    <circle r="50" fill="none" stroke="url(#gb)" stroke-width="5.5"/>
    <circle r="27" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85"/>
    <circle r="11" fill="#1ABC9C"/>
  </g>

  <!-- customer split: filled teal = joiners flowing in, hollow grey = non-responders falling away -->
  <g fill="#1ABC9C">
    <circle cx="500" cy="266" r="7"/>
    <circle cx="546" cy="278" r="7"/>
    <circle cx="586" cy="292" r="7"/>
  </g>
  <g fill="none" stroke="#8b95a3" stroke-width="3">
    <circle cx="392" cy="392" r="7" opacity="0.85"/>
    <circle cx="452" cy="420" r="7" opacity="0.6"/>
    <circle cx="510" cy="444" r="7" opacity="0.4"/>
  </g>

  <!-- floating panel: confusion matrix (the classification signature) -->
  <g transform="translate(92,96) rotate(-5)">
    <rect x="5" y="7" width="180" height="150" rx="12" fill="#000000" opacity="0.30"/>
    <rect width="180" height="150" rx="12" fill="#eef2f7"/>
    <rect width="180" height="26" rx="12" fill="#dfe6ee"/>
    <rect y="14" width="180" height="12" fill="#dfe6ee"/>
    <circle cx="16" cy="13" r="4" fill="#17A589"/>
    <circle cx="30" cy="13" r="4" fill="#2E86C1"/>
    <circle cx="44" cy="13" r="4" fill="#b9c4d1"/>
    <!-- 2x2 grid: strong diagonal -->
    <rect x="22" y="40" width="62" height="46" rx="6" fill="#17A589"/>
    <rect x="96" y="40" width="62" height="46" rx="6" fill="#ccd6e0"/>
    <rect x="22" y="94" width="62" height="46" rx="6" fill="#ccd6e0"/>
    <rect x="96" y="94" width="62" height="46" rx="6" fill="#2E86C1"/>
    <circle cx="53" cy="63" r="9" fill="#eafcf7" opacity="0.9"/>
    <circle cx="127" cy="117" r="9" fill="#eaf3fb" opacity="0.9"/>
  </g>

  <!-- floating panel: response gauge -->
  <g transform="translate(560,72) rotate(4)">
    <rect x="5" y="7" width="160" height="112" rx="12" fill="#000000" opacity="0.30"/>
    <rect width="160" height="112" rx="12" fill="#eef2f7"/>
    <rect width="160" height="24" rx="12" fill="#dfe6ee"/>
    <rect y="12" width="160" height="12" fill="#dfe6ee"/>
    <circle cx="15" cy="12" r="4" fill="#17A589"/>
    <circle cx="28" cy="12" r="4" fill="#2E86C1"/>
    <path d="M 30 96 A 50 50 0 0 1 130 96" fill="none" stroke="#d4dce4" stroke-width="10" stroke-linecap="round"/>
    <path d="M 30 96 A 50 50 0 0 1 118 62" fill="none" stroke="url(#gb)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="80" cy="96" r="6" fill="#5a6b7e"/>
    <line x1="80" y1="96" x2="112" y2="66" stroke="#5a6b7e" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- connectors: panels feed the field -->
  <g stroke="#2E86C1" stroke-width="2" stroke-dasharray="5 6" fill="none" opacity="0.7">
    <path d="M 190 262 C 210 320 240 360 268 396"/>
    <path d="M 630 196 C 634 220 636 240 636 254"/>
  </g>
  <circle cx="268" cy="396" r="4" fill="#17A589"/>
  <circle cx="636" cy="254" r="4" fill="#2E86C1"/>

  <!-- ambient data dots -->
  <g fill="#e7e7e7">
    <circle cx="80" cy="330" r="3.5" opacity="0.5"/>
    <circle cx="726" cy="420" r="3.5" opacity="0.5"/>
    <circle cx="748" cy="330" r="3" opacity="0.35"/>
    <circle cx="66" cy="440" r="3" opacity="0.35"/>
  </g>
</svg>
