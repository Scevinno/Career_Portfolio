<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Detecting undervalued homes in London">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252a36"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17A589"/>
      <stop offset="1" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ec8a5"/>
      <stop offset="1" stop-color="#148f9e"/>
    </linearGradient>
    <radialGradient id="glowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#17A589" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#17A589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E86C1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2E86C1" stop-opacity="0"/>
    </radialGradient>

    <!-- reusable 2.5D house: origin = bottom-left of front face -->
    <g id="ihouse-ink">
      <polygon points="56,-44 72,-53 72,-9 56,0" fill="#151a26"/>
      <polygon points="28,-70 44,-79 72,-53 56,-44" fill="#10141d"/>
      <rect x="0" y="-44" width="56" height="44" fill="#242c3e"/>
      <polygon points="0,-44 28,-70 56,-44" fill="#2b3448"/>
      <rect x="22" y="-20" width="12" height="20" rx="1.5" fill="#10141d"/>
      <rect x="8" y="-34" width="10" height="9" rx="1" fill="#7fb9ad" opacity="0.55"/>
      <rect x="38" y="-34" width="10" height="9" rx="1" fill="#7fb9ad" opacity="0.55"/>
    </g>
    <g id="ihouse-teal">
      <polygon points="56,-44 72,-53 72,-9 56,0" fill="#0f7d90"/>
      <polygon points="28,-70 44,-79 72,-53 56,-44" fill="#0c6376"/>
      <rect x="0" y="-44" width="56" height="44" fill="url(#house)"/>
      <polygon points="0,-44 28,-70 56,-44" fill="#25dcb8"/>
      <rect x="22" y="-20" width="12" height="20" rx="1.5" fill="#0b2f33"/>
      <rect x="8" y="-34" width="10" height="9" rx="1" fill="#eafcf7"/>
      <rect x="38" y="-34" width="10" height="9" rx="1" fill="#eafcf7"/>
    </g>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#3E4250" stroke-width="1" opacity="0.28">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>

  <!-- atmosphere -->
  <ellipse cx="400" cy="440" rx="360" ry="230" fill="url(#glowT)"/>
  <ellipse cx="620" cy="160" rx="280" ry="200" fill="url(#glowB)"/>

  <!-- isometric platform -->
  <polygon points="400,576 140,466 140,440 400,550 660,440 660,466" fill="#0e1219"/>
  <polygon points="400,330 660,440 400,550 140,440" fill="#1c2230"/>
  <polygon points="400,330 660,440 400,550 140,440" fill="none" stroke="url(#gb)" stroke-width="2" opacity="0.55"/>

  <!-- the street: four ink houses, one teal outlier -->
  <use href="#ihouse-ink" transform="translate(196,462) scale(0.82)"/>
  <use href="#ihouse-ink" transform="translate(282,502) scale(0.9)"/>
  <use href="#ihouse-ink" transform="translate(470,506) scale(0.9)"/>
  <use href="#ihouse-ink" transform="translate(548,464) scale(0.82)"/>
  <use href="#ihouse-teal" transform="translate(360,494) scale(1.18)"/>

  <!-- magnifier locked onto the teal home -->
  <g transform="translate(462,368)">
    <circle r="44" fill="#17A589" opacity="0.12"/>
    <circle r="44" fill="none" stroke="#ffffff" stroke-width="6.5"/>
    <line x1="32" y1="32" x2="68" y2="68" stroke="#2E86C1" stroke-width="8.5" stroke-linecap="round"/>
    <path d="M -16 0 L -5 11 L 18 -13" fill="none" stroke="url(#gb)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- floating panel: price scatter + fair-value fit line (the regression signature) -->
  <g transform="translate(505,88) rotate(4)">
    <rect x="5" y="7" width="210" height="140" rx="12" fill="#000000" opacity="0.30"/>
    <rect width="210" height="140" rx="12" fill="#eef2f7"/>
    <rect width="210" height="26" rx="12" fill="#dfe6ee"/>
    <rect y="14" width="210" height="12" fill="#dfe6ee"/>
    <circle cx="16" cy="13" r="4" fill="#17A589"/>
    <circle cx="30" cy="13" r="4" fill="#2E86C1"/>
    <circle cx="44" cy="13" r="4" fill="#b9c4d1"/>
    <g fill="#5a6b7e">
      <circle cx="34" cy="112" r="4.5"/><circle cx="62" cy="98" r="4.5"/>
      <circle cx="90" cy="102" r="4.5"/><circle cx="118" cy="78" r="4.5"/>
      <circle cx="146" cy="66" r="4.5"/><circle cx="174" cy="52" r="4.5"/>
    </g>
    <circle cx="104" cy="118" r="6" fill="#17A589"/>
    <path d="M 22 122 C 80 108 140 76 192 42" fill="none" stroke="url(#gb)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- floating panel: price bars -->
  <g transform="translate(96,120) rotate(-5)">
    <rect x="5" y="7" width="170" height="122" rx="12" fill="#000000" opacity="0.30"/>
    <rect width="170" height="122" rx="12" fill="#eef2f7"/>
    <rect width="170" height="24" rx="12" fill="#dfe6ee"/>
    <rect y="12" width="170" height="12" fill="#dfe6ee"/>
    <circle cx="15" cy="12" r="4" fill="#17A589"/>
    <circle cx="28" cy="12" r="4" fill="#2E86C1"/>
    <g>
      <rect x="22" y="72" width="18" height="34" rx="3" fill="#17A589"/>
      <rect x="52" y="56" width="18" height="50" rx="3" fill="#1c9fa5"/>
      <rect x="82" y="64" width="18" height="42" rx="3" fill="#2493b3"/>
      <rect x="112" y="42" width="18" height="64" rx="3" fill="#2E86C1"/>
      <rect x="142" y="84" width="18" height="22" rx="3" fill="#b9c4d1"/>
    </g>
  </g>

  <!-- connectors: panels feed the street -->
  <g stroke="#2E86C1" stroke-width="2" stroke-dasharray="5 6" fill="none" opacity="0.7">
    <path d="M 185 250 C 200 310 250 360 300 420"/>
    <path d="M 590 238 C 570 290 520 320 480 350"/>
  </g>
  <circle cx="300" cy="420" r="4" fill="#17A589"/>
  <circle cx="480" cy="350" r="4" fill="#2E86C1"/>

  <!-- ambient data dots -->
  <g fill="#e7e7e7">
    <circle cx="88" cy="330" r="3.5" opacity="0.5"/>
    <circle cx="708" cy="300" r="3.5" opacity="0.5"/>
    <circle cx="742" cy="380" r="3" opacity="0.35"/>
    <circle cx="66" cy="430" r="3" opacity="0.35"/>
  </g>
</svg>
